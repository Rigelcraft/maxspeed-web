<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MaxSpeed - Compra y Venta</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            background-color: #000;
        }

        body {
            background-image: url('https://img.freepik.com/foto-gratis/trabajador-servicio-coche-musculoso-reparando-vehiculo_146671-19605.jpg?semt=ais_hybrid&w=740&q=80');
            background-size: cover;
            background-position: 80% center !important;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: rgb(0 0 0 / 34%);
            background-blend-mode: darken;
            display: block;
            overflow-y: auto;
            padding: 0 0 50px 0; /* Quitamos padding superior para fijar la cabecera bien arriba */
        }

        /* Cabecera Fija (Sticky) */
        .cabecera-fija {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            padding: 15px 0 10px 0;
            border-bottom: 2px solid #222;
        }

        .contenedor-principal {
            width: 100%;
            max-width: 1200px; /* Expandido para aprovechar pantallas grandes */
            margin: 0 auto;
            padding: 0 15px;
        }

        .bloque-encabezado {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 12px;
        }

        .logo-imagen {
            max-width: 100%;
            width: 280px;
            height: auto;
            display: block;
        }

        .titulo-seccion {
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 0 0 4px #000;
            text-align: center;
            margin-top: 5px;
        }

        .barra-acciones {
            display: flex;
            gap: 8px;
            width: 100%;
            max-width: 500px; /* Centrado y acotado para que no se estire demasiado */
            margin: 0 auto 5px auto;
        }

        .barra-acciones input {
            flex: 1;
            padding: 12px 15px;
            border: 3px solid #000;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: bold;
            outline: none;
            background: white;
        }

        .btn-nuevo {
            padding: 12px 18px;
            background: #2ecc71;
            color: white;
            border: 3px solid #000;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .btn-nuevo:active {
            transform: scale(0.95);
        }

        /* Contenedor en Cuadrícula / Grid Responsivo */
        .grid-vehiculos {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
            width: 100%;
        }

        /* Cambia a 2 columnas en tablets y 3 columnas en pantallas grandes */
        @media (min-width: 600px) {
            .grid-vehiculos {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (min-width: 950px) {
            .grid-vehiculos {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .vehiculo-card {
            background: white;
            border: 4px solid #000;
            border-radius: 18px;
            padding: 14px;
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .vehiculo-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .vehiculo-card:active {
            transform: scale(0.98);
        }

        .vehiculo-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 4px;
            padding-right: 32px; /* Espacio reservado para el botón eliminar */
        }

        .vehiculo-nombre {
            font-size: 1rem;
            font-weight: bold;
            color: #000;
            word-break: break-word;
        }

        .vehiculo-patente {
            font-weight: bold;
            color: #555;
            font-size: 0.8rem;
            white-space: nowrap;
            background: #eee;
            padding: 2px 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        /* Botón de eliminación directa rápido */
        .btn-eliminar-rapido {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #ffcbd1;
            border: 2px solid #000;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s;
            z-index: 5;
        }

        .btn-eliminar-rapido:hover {
            background: #e74c3c;
        }

        .btn-eliminar-rapido:active {
            transform: scale(0.9);
        }

        .vehiculo-detalles {
            font-size: 0.8rem;
            color: #555;
            margin: 3px 0;
        }

        .vehiculo-precios {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 2px solid #eee;
        }

        .precio-compra {
            color: #e74c3c;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .precio-venta {
            color: #2ecc71;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .ganancia {
            color: #2ecc71;
            font-weight: bold;
            font-size: 1rem;
        }

        .estado {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: bold;
            border: 2px solid #000;
        }

        .estado-disponible {
            background: #d4edda;
            color: #155724;
        }

        .estado-vendido {
            background: #cce5ff;
            color: #004085;
        }

        .estado-reparacion {
            background: #fff3cd;
            color: #856404;
        }

        .label-precio {
            font-size: 0.6rem;
            color: #888;
            font-weight: bold;
        }

        .loading, .empty {
            text-align: center;
            padding: 40px;
            font-weight: bold;
            color: #fff;
            font-size: 0.9rem;
            text-shadow: 1px 1px 3px #000;
            grid-column: 1 / -1; /* Ocupa todo el ancho del grid */
        }

        .empty span {
            display: block;
            font-size: 0.75rem;
            color: #ccc;
            margin-top: 5px;
        }

        .btn-volver {
            width: 100%;
            max-width: 300px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #7f8c8d;
            border: 4px solid #000;
            border-radius: 20px;
            cursor: pointer;
            text-align: center;
            margin: 20px auto 0 auto;
            display: block;
        }

        .btn-volver:active {
            transform: scale(0.98);
        }

        @media (max-width: 380px) {
            .vehiculo-nombre {
                font-size: 0.85rem;
            }
            .btn-nuevo {
                font-size: 0.75rem;
                padding: 10px 12px;
            }
            .barra-acciones input {
                font-size: 0.8rem;
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>

    <!-- Cabecera y buscador fijos arriba -->
    <div class="cabecera-fija">
        <div class="contenedor-principal">
            <div class="bloque-encabezado">
                <img src="logo.png" alt="MaxSpeed" class="logo-imagen">
                <h1 class="titulo-seccion">🚗 Compra y Venta</h1>
            </div>

            <div class="barra-acciones">
                <input type="text" id="buscadorVehiculo" placeholder="🔍 Buscar vehículo...">
                <button class="btn-nuevo" onclick="agregarVehiculo()">➕ Nuevo</button>
            </div>
        </div>
    </div>

    <!-- Cuerpo principal con la lista expandible -->
    <div class="contenedor-principal">
        <div id="listaVehiculos" class="grid-vehiculos">
            <div class="loading">Cargando vehículos...</div>
        </div>

        <button class="btn-volver" onclick="window.location.href='menu.html'">← Volver al Menú</button>
    </div>

    <script>
        let todosLosVehiculos = [];

        // ============================================================
        // SEGURIDAD
        // ============================================================
        if (localStorage.getItem('tipoUsuario') !== 'admin') {
            alert("⛔ Acceso denegado");
            window.location.href = "index.html";
        }

        // CARGAR VEHÍCULOS - CON VERIFICACIÓN DE PIN
        async function cargarVehiculos() {
            try {
                const pin = localStorage.getItem('pinValidated');
                console.log("🔑 PIN que se envía:", pin);
                
                if (!pin) {
                    alert("⛔ No hay PIN guardado. Inicia sesión nuevamente.");
                    window.location.href = "index.html";
                    return;
                }
                
                const res = await fetch(`/obtener-vehiculos?pin=${pin}`);
                console.log("📌 Status:", res.status);
                
                if (res.status === 401 || res.status === 403) {
                    alert("⛔ PIN no autorizado. Inicia sesión nuevamente.");
                    localStorage.removeItem('pinValidated');
                    window.location.href = "index.html";
                    return;
                }
                
                const data = await res.json();
                console.log("📌 Datos recibidos:", data);
                
                if (Array.isArray(data)) {
                    todosLosVehiculos = data;
                    mostrarVehiculos(todosLosVehiculos);
                } else if (data.error) {
                    document.getElementById('listaVehiculos').innerHTML = `
                        <div class="empty">❌ ${data.error}</div>
                    `;
                } else {
                    document.getElementById('listaVehiculos').innerHTML = `
                        <div class="empty">❌ Respuesta inesperada del servidor</div>
                    `;
                }
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('listaVehiculos').innerHTML = `
                    <div class="empty">❌ Error: ${error.message}</div>
                `;
            }
        }

        // ============================================================
        // MOSTRAR VEHÍCULOS
        // ============================================================
        function mostrarVehiculos(vehiculos) {
            const contenedor = document.getElementById('listaVehiculos');
            
            if (!vehiculos || vehiculos.length === 0) {
                contenedor.innerHTML = `
                    <div class="empty">
                        🚗 No hay vehículos registrados
                        <span>Toca "Nuevo" para agregar uno</span>
                    </div>
                `;
                return;
            }

            contenedor.innerHTML = vehiculos.map(v => {
                const ganancia = v.estado === 'vendido' && v.precioVenta && v.costoTotal 
                    ? v.precioVenta - v.costoTotal 
                    : 0;

                return `
                    <div class="vehiculo-card" onclick="verVehiculo('${v._id}')">
                        <!-- Botón directo de eliminar rápido -->
                        <button class="btn-eliminar-rapido" onclick="eliminarVehiculoRapido(event, '${v._id}', '${escapeHtml(v.marca)} ${escapeHtml(v.modelo)}')">🗑️</button>
                        
                        <div class="vehiculo-header">
                            <span class="vehiculo-nombre">${escapeHtml(v.marca || '')} ${escapeHtml(v.modelo || '')} ${v.año || ''}</span>
                            <span class="vehiculo-patente">${escapeHtml(v.patente || 'S/P')}</span>
                        </div>
                        <div class="vehiculo-detalles">
                            ${v.color ? `🎨 ${escapeHtml(v.color)}` : ''} 
                            ${v.kilometraje ? `• 📊 ${v.kilometraje.toLocaleString()} km` : ''}
                        </div>
                        <div class="vehiculo-detalles" style="margin-top:4px;">
                            <span class="estado ${v.estado === 'vendido' ? 'estado-vendido' : v.estado === 'en_reparacion' ? 'estado-reparacion' : 'estado-disponible'}">
                                ${v.estado === 'vendido' ? '✅ Vendido' : v.estado === 'en_reparacion' ? '🔧 En reparación' : '📌 Disponible'}
                            </span>
                        </div>
                        <div class="vehiculo-precios">
                            <div>
                                <div class="label-precio">Costo compra</div>
                                <span class="precio-compra">$${formatearPrecio(v.costoCompra || 0)}</span>
                            </div>
                            ${v.estado === 'vendido' ? `
                                <div style="text-align:center;">
                                    <div class="label-precio">Ganancia</div>
                                    <span class="ganancia">$${formatearPrecio(ganancia)}</span>
                                </div>
                                <div style="text-align:right;">
                                    <div class="label-precio">Precio venta</div>
                                    <span class="precio-venta">$${formatearPrecio(v.precioVenta || 0)}</span>
                                </div>
                            ` : `
                                <div style="text-align:right;">
                                    <div class="label-precio">Reparaciones</div>
                                    <span style="font-weight:bold; color:#f39c12;">$${formatearPrecio(v.costoTotalReparaciones || 0)}</span>
                                </div>
                            `}
                        </div>
                        ${v.estado !== 'vendido' && v.costoTotalReparaciones > 0 ? `
                            <div style="font-size:0.65rem; color:#888; margin-top:4px; text-align:right;">
                                Costo total: $${formatearPrecio((v.costoCompra || 0) + (v.costoTotalReparaciones || 0))}
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        // ============================================================
        // ELIMINACIÓN DIRECTA RÁPIDA
        // ============================================================
        async function eliminarVehiculoRapido(event, id, nombreVehiculo) {
            // Evita que al dar clic se abra la vista de detalles del carro
            event.stopPropagation();
            
            if (!confirm(`⚠️ ¿Estás seguro de que deseas eliminar permanentemente el vehículo: ${nombreVehiculo}?`)) {
                return;
            }

            try {
                const pin = localStorage.getItem('pinValidated');
                const res = await fetch(`/eliminar-vehiculo/${id}?pin=${pin}`, {
                    method: 'DELETE'
                });

                const resultado = await res.json();

                if (res.ok) {
                    alert("🗑️ Vehículo eliminado correctamente.");
                    // Refrescar la lista de forma inmediata localmente
                    todosLosVehiculos = todosLosVehiculos.filter(v => v._id !== id);
                    mostrarVehiculos(todosLosVehiculos);
                } else {
                    alert(`❌ Error: ${resultado.error || 'No se pudo eliminar el vehículo'}`);
                }
            } catch (error) {
                console.error("Error al eliminar:", error);
                alert("❌ Error de conexión al intentar eliminar.");
            }
        }

        // ============================================================
        // BUSCADOR
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            const buscador = document.getElementById('buscadorVehiculo');
            
            buscador.addEventListener('input', function(e) {
                const busqueda = this.value.toLowerCase().trim();
                
                if (busqueda === '') {
                    mostrarVehiculos(todosLosVehiculos);
                    return;
                }

                const filtrados = todosLosVehiculos.filter(v => {
                    const marca = (v.marca || '').toLowerCase();
                    const modelo = (v.modelo || '').toLowerCase();
                    const patente = (v.patente || '').toLowerCase();
                    return marca.includes(busqueda) || modelo.includes(busqueda) || patente.includes(busqueda);
                });

                mostrarVehiculos(filtrados);
            });
        });

        // ============================================================
        // FUNCIONES AUXILIARES
        // ============================================================
        function formatearPrecio(valor) {
            return valor.toLocaleString('es-CL');
        }

        function escapeHtml(texto) {
            if (!texto) return '';
            return texto.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }

        function agregarVehiculo() {
            localStorage.removeItem('vehiculoSeleccionado');
            window.location.href = 'nuevo-vehiculo.html';
        }

        function verVehiculo(id) {
            console.log("🚗 ID del vehículo seleccionado:", id);
            localStorage.setItem('vehiculoSeleccionado', id);
            const guardado = localStorage.getItem('vehiculoSeleccionado');
            console.log("📌 Guardado en localStorage:", guardado);
            window.location.href = 'ver-vehiculo.html';
        }

        // ============================================================
        // INICIALIZAR
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            cargarVehiculos();
        });
    </script>
</body>
</html>

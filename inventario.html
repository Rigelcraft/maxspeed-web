<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaxSpeed - Inventario</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- 1. RESET Y GLOBALES (Idéntico a tu Menú) --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            overflow-x: hidden;
            width: 100%;
            min-height: 100vh;
        }

        body {
            background-image: url('https://img.freepik.com/foto-gratis/trabajador-servicio-coche-musculoso-reparando-vehiculo_146671-19605.jpg?semt=ais_hybrid&w=740&q=80');
            background-size: cover;
            background-position: 80% !important;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: rgb(0 0 0 / 34%);
            background-blend-mode: darken;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding-top: 40px !important;
        }

        /* --- 2. LAYOUT Y ELEMENTOS COMUNES --- */
        .contenedor-principal {
            width: 100%;
            max-width: 360px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 5px !important;
        }

        .bloque-encabezado {
            width: 100%;
            display: flex;
            margin-top: -10px !important;
            margin-bottom: 5px !important;
            justify-content: center;
        }

        .logo-imagen {
            max-width: 100%;
            width: 350px;
            height: auto;
        }

        .titulo-seccion {
            color: #ffffff;
            font-size: 25px;
            font-weight: bold;
            text-shadow: 0 0 4px #000, 0 0 4px #000, 0 0 4px #000, 0 0 4px #000, 0 0 4px #000;
            text-align: center;
            margin-bottom: 20px;
        }

        /* --- 3. TARJETAS DE PRODUCTOS OPTIMIZADAS --- */
        #listaProductos {
            width: 100%;
        }

        .producto-card {
            background: white;
            border: 4px solid #000;
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between; /* Distribuye los bloques a los extremos */
            gap: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .stock-bajo {
            background: #fde8e8 !important;
        }

        /* Contenedor izquierdo para los textos */
        .producto-info {
            flex: 1; /* Ocupa todo el espacio libre de la izquierda */
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0; /* Evita que los textos colapsen o rompan el flex */
            text-align: left; /* Alinea los nombres a la izquierda */
        }

        .producto-nombre {
            font-weight: bold;
            font-size: 1.05rem;
            color: #222;
            line-height: 1.2;
            word-break: break-word; /* Rompe por palabras de forma natural si es muy largo */
        }

        .producto-detalle {
            font-size: 0.8rem;
            color: #666;
        }

        /* Contenedor derecho para precios, stock y botones */
        .producto-precios {
            display: flex;
            flex-direction: column;
            align-items: flex-end; /* Alinea los costos a la derecha */
            text-align: right;
            min-width: 75px;
            justify-content: center;
        }

        .precio-venta {
            font-size: 1.1rem;
            font-weight: bold;
            color: #2ecc71;
            white-space: nowrap; /* Evita que el precio se parta en dos renglones */
        }

        .precio-costo {
            font-size: 0.75rem;
            color: #888;
            margin-top: 1px;
            white-space: nowrap;
        }

        .producto-stock-container {
            text-align: center;
            min-width: 45px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .producto-stock {
            font-size: 1.3rem;
            font-weight: bold;
            color: #2ecc71;
        }

        .producto-stock.bajo {
            color: #e74c3c;
        }

        .acciones-producto {
            display: flex;
            gap: 4px;
            align-items: center;
            justify-content: center;
        }

        .btn-accion {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px;
        }

        /* --- 4. BOTONES Y MODAL --- */
        .btn-flotante {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: #FF8533;
            color: white;
            font-size: 2.5rem;
            border: 4px solid #000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 100;
        }

        .btn-volver-menu {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background-color: #7f8c8d;
            border: 4px solid #000;
            border-radius: 20px;
            cursor: pointer;
            text-align: center;
            margin-top: 15px;
        }

        .btn-volver-menu:active { transform: scale(0.98); }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.abierto { display: flex; }

        .modal {
            background: white;
            border: 4px solid #000;
            border-radius: 20px;
            padding: 20px;
            max-width: 340px;
            width: 90%;
        }

        .modal h2 { font-size: 1.3rem; margin-bottom: 12px; text-align: center; }
        .modal .campo { margin-bottom: 10px; }
        .modal .campo label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; }
        .modal .campo input { width: 100%; padding: 10px; border: 3px solid #000; border-radius: 10px; font-weight: bold; }
        .modal .botones-modal { display: flex; gap: 10px; margin-top: 15px; }

        .modal .btn-guardar { flex: 2; background: #2ECC71; color: black; border: 3px solid #000; border-radius: 10px; padding: 10px; font-weight: bold; }
        .modal .btn-cancelar { flex: 1; background: #e74c3c; color: white; border: 3px solid #000; border-radius: 10px; padding: 10px; font-weight: bold; }

        .loading, .sin-productos {
            color: white;
            text-align: center;
            font-weight: bold;
            text-shadow: 1px 1px 4px #000;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="contenedor-principal">
        <div class="bloque-encabezado">
            <img src="logo.png" alt="MaxSpeed" class="logo-imagen">
        </div>
        <p class="titulo-seccion">📦 Inventario</p>

        <div id="listaProductos">
            <div class="loading">Cargando inventario...</div>
        </div>

        <button class="btn-volver-menu" onclick="window.location.href='menu.html'">← Volver al Menú</button>
    </div>

    <button class="btn-flotante" id="btnAgregar">+</button>

    <div class="modal-overlay" id="modalInventario">
        <div class="modal">
            <h2 id="modalTitulo">Agregar Producto</h2>
            
            <div class="campo">
                <label>Nombre del producto *</label>
                <input type="text" id="inputNombre" placeholder="Ej. Aceite 10W30">
            </div>
            
            <div class="campo">
                <label>Costo (lo que pagaste) *</label>
                <input type="number" id="inputCosto" placeholder="0.00" step="0.01">
            </div>
            
            <div class="campo">
                <label>Precio de venta (al cliente) *</label>
                <input type="number" id="inputPrecio" placeholder="0.00" step="0.01">
            </div>
            
            <div class="campo">
                <label>Cantidad en stock *</label>
                <input type="number" id="inputStock" placeholder="0" step="1">
            </div>
            
            <div class="campo">
                <label>Proveedor (opcional)</label>
                <input type="text" id="inputProveedor" placeholder="Ej. Distribuidora XYZ">
            </div>
            
            <div class="botones-modal">
                <button class="btn-cancelar" id="btnCancelarModal">Cancelar</button>
                <button class="btn-guardar" id="btnGuardarProducto">💾 Guardar</button>
            </div>
        </div>
    </div>

    <script>
        let productos = [];
        let productoEditando = null; 

        document.addEventListener("DOMContentLoaded", async () => {
            const tipoUsuario = localStorage.getItem('tipoUsuario');
            const pinGuardado = localStorage.getItem('pinValidated');

            if (tipoUsuario !== 'admin') {
                alert("⛔ Acceso denegado. Solo administradores pueden ver el inventario.");
                window.location.href = "menu.html";
                return;
            }

            if (!pinGuardado) {
                window.location.href = "index.html";
                return;
            }

            await cargarInventario();

            document.getElementById('btnAgregar').addEventListener('click', () => abrirModal());
            document.getElementById('btnCancelarModal').addEventListener('click', cerrarModal);
            document.getElementById('btnGuardarProducto').addEventListener('click', guardarProducto);
            
            document.getElementById('modalInventario').addEventListener('click', (e) => {
                if (e.target === document.getElementById('modalInventario')) cerrarModal();
            });
        });

        async function cargarInventario() {
            try {
                const res = await fetch('/obtener-inventario');
                productos = await res.json();
                mostrarProductos();
            } catch (error) {
                console.error("Error cargando inventario:", error);
                document.getElementById('listaProductos').innerHTML = '<div class="sin-productos">❌ Error al cargar el inventario</div>';
            }
        }

        function mostrarProductos() {
            const contenedor = document.getElementById('listaProductos');
        
            if (productos.length === 0) {
                contenedor.innerHTML = '<div class="sin-productos">📭 No hay productos en el inventario.<br>Presiona el botón + para agregar</div>';
                return;
            }
        
            contenedor.innerHTML = productos.map(p => `
                <div class="producto-card ${p.stock < 5 ? 'stock-bajo' : ''}">
                    <div class="producto-info">
                        <div class="producto-nombre">${escapeHtml(p.nombre)}</div>
                        <div class="producto-detalle">${p.proveedor ? `🏷️ ${escapeHtml(p.proveedor)}` : '🏷️ Sin proveedor'}</div>
                    </div>
                    <div class="producto-precios">
                        <span class="precio-venta">💰$${parseFloat(p.precioVenta).toFixed(2)}</span>
                        <span class="precio-costo">Costo: $${parseFloat(p.costo).toFixed(2)}</span>
                    </div>
                    <div class="producto-stock-container">
                        <div class="producto-stock ${p.stock < 5 ? 'bajo' : ''}">${p.stock}</div>
                        <div style="font-size: 0.6rem; color: #666; font-weight: bold;">${p.stock < 5 ? '⚠️ Bajo' : 'Stock'}</div>
                    </div>
                    <div class="acciones-producto">
                        <button class="btn-accion" onclick="editarProducto('${p._id}')">✏️</button>
                        <button class="btn-accion" onclick="eliminarProducto('${p._id}')">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function abrirModal(producto = null) {
            const modal = document.getElementById('modalInventario');
            const titulo = document.getElementById('modalTitulo');

            if (producto) {
                titulo.textContent = '✏️ Editar Producto';
                document.getElementById('inputNombre').value = producto.nombre || '';
                document.getElementById('inputCosto').value = producto.costo || '';
                document.getElementById('inputPrecio').value = producto.precioVenta || '';
                document.getElementById('inputStock').value = producto.stock || '';
                document.getElementById('inputProveedor').value = producto.proveedor || '';
                productoEditando = producto._id;
            } else {
                titulo.textContent = '➕ Agregar Producto';
                document.getElementById('inputNombre').value = '';
                document.getElementById('inputCosto').value = '';
                document.getElementById('inputPrecio').value = '';
                document.getElementById('inputStock').value = '';
                document.getElementById('inputProveedor').value = '';
                productoEditando = null;
            }

            modal.classList.add('abierto');
        }

        function cerrarModal() {
            document.getElementById('modalInventario').classList.remove('abierto');
            productoEditando = null;
        }

        function editarProducto(id) {
            const producto = productos.find(p => p._id === id);
            if (producto) abrirModal(producto);
        }

        async function guardarProducto() {
            const nombre = document.getElementById('inputNombre').value.trim();
            const costo = parseFloat(document.getElementById('inputCosto').value);
            const precioVenta = parseFloat(document.getElementById('inputPrecio').value);
            const stock = parseInt(document.getElementById('inputStock').value);
            const proveedor = document.getElementById('inputProveedor').value.trim();

            if (!nombre) { alert("❌ El nombre es obligatorio"); return; }
            if (isNaN(costo) || costo <= 0) { alert("❌ El costo debe ser mayor a 0"); return; }
            if (isNaN(precioVenta) || precioVenta <= 0) { alert("❌ El precio de venta debe ser mayor a 0"); return; }
            if (isNaN(stock) || stock < 0) { alert("❌ El stock no puede ser negativo"); return; }

            const datos = { nombre, costo, precioVenta, stock, proveedor };

            let url = '/guardar-producto';
            let metodo = 'POST';
            
            if (productoEditando) {
                datos._id = productoEditando;
                url = '/actualizar-producto';
                metodo = 'POST';
            }

            try {
                const res = await fetch(url, {
                    method: metodo,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });
                const resultado = await res.json();
                alert(resultado.mensaje || '✅ Producto guardado');
                cerrarModal();
                await cargarInventario();
            } catch (error) {
                console.error("Error:", error);
                alert("❌ Error al guardar el producto");
            }
        }

        async function eliminarProducto(id) {
            if (!confirm("⚠️ ¿Eliminar este producto permanentemente?")) return;

            try {
                const res = await fetch('/eliminar-producto', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _id: id })
                });
                const resultado = await res.json();
                alert(resultado.mensaje || '✅ Producto eliminado');
                await cargarInventario();
            } catch (error) {
                console.error("Error:", error);
                alert("❌ Error al eliminar el producto");
            }
        }

        function escapeHtml(texto) {
            if (!texto) return "";
            return texto.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
    </script>
</body>
</html>

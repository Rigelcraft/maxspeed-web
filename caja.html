<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MaxSpeed - Panel de Caja</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- 1. RESET Y GLOBALES --- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            background-color: #000; /* Fondo base por si tarda la imagen */
        }

        body {
            background-image: url('https://img.freepik.com/foto-gratis/trabajador-servicio-coche-musculoso-reparando-vehiculo_146671-19605.jpg?semt=ais_hybrid&w=740&q=80');
            background-size: cover;
            background-position: 80% center !important;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: rgb(0 0 0 / 34%);
            background-blend-mode: darken;
            display: block; /* Cambiado a block para evitar que flexbox empuje elementos hacia arriba negativamente */
            overflow-y: auto;
            padding: 30px 0 50px 0; /* Espaciado fijo arriba y abajo */
        }

        /* --- 2. LAYOUT DEL CONTENEDOR PRINCIPAL --- */
        .contenedor-principal {
            width: 100%;
            max-width: 360px;
            margin: 0 auto; /* Centra el contenido horizontalmente de forma perfecta */
            padding: 0 15px;
        }

        .bloque-encabezado {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px;
        }

        .logo-imagen {
            max-width: 100%;
            width: 350px;
            height: auto;
            display: block;
        }

        .titulo-seccion {
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 4px #000, 0 0 4px #000, 0 0 4px #000, 0 0 4px #000, 0 0 4px #000;
            text-align: center;
            margin-top: 5px;
        }

        /* --- 3. SELECTORES DE MÓDULOS --- */
        .modulos {
            display: flex;
            gap: 6px;
            width: 100%;
            margin-bottom: 15px;
        }

        .modulo-btn {
            flex: 1;
            padding: 10px 4px;
            background: white;
            border: 3px solid #000;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
            color: #000;
        }

        .modulo-btn.activo {
            background: #667eea;
            color: white;
            text-shadow: 1px 1px 2px #000;
        }

        /* --- 4. SELECTOR DE PERÍODO --- */
        .periodo-selector {
            background: white;
            border: 4px solid #000;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 15px;
            width: 100%;
        }

        .tipo-vista {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }

        .tipo-btn {
            flex: 1;
            padding: 8px 4px;
            background: #f0f2f5;
            border: 2px solid #000;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            color: #333;
        }

        .tipo-btn.activo {
            background: #FF8533;
            color: white;
        }

        .selector-filas {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .selector-grupo {
            flex: 1;
            min-width: 0;
        }

        .selector-grupo label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            color: #333;
            margin-bottom: 4px;
        }

        .selector-desplegable {
            width: 100%;
            padding: 8px;
            border: 2px solid #000;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            background: white;
        }

        /* --- 5. TARJETAS DE ACUMULADOS Y DATOS --- */
        .card-total {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 4px solid #000;
            border-radius: 20px;
            padding: 18px 10px;
            margin-bottom: 15px;
            color: white;
            text-align: center;
            width: 100%;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .card-total .label {
            font-size: 0.75rem;
            font-weight: bold;
        }

        .card-total .amount {
            font-size: 2.2rem;
            font-weight: bold;
            margin: 4px 0;
            word-break: break-word;
        }

        .card-total .sub {
            font-size: 0.7rem;
            opacity: 0.9;
        }

        /* Grid de información */
        .grid-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
            width: 100%;
        }

        .info-card {
            background: white;
            border: 3px solid #000;
            border-radius: 18px;
            padding: 12px 6px;
            text-align: center;
        }

        .info-card .icon {
            font-size: 1.4rem;
            margin-bottom: 2px;
        }

        .info-card .value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #000;
        }

        .info-card .label {
            font-size: 0.65rem;
            color: #555;
            font-weight: bold;
            margin-top: 2px;
        }

        /* Tarjeta ganancia diaria */
        .card-earning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: 3px solid #000;
            border-radius: 18px;
            padding: 12px;
            margin-bottom: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .card-earning .value {
            font-size: 1.4rem;
            font-weight: bold;
        }

        .card-earning .label {
            font-size: 0.65rem;
            font-weight: bold;
        }

        /* --- 6. CONTENEDOR DE TRABAJOS --- */
        .trabajos-container {
            background: white;
            border: 4px solid #000;
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 15px;
            width: 100%;
        }

        .trabajos-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 3px solid #000;
            margin-bottom: 10px;
        }

        .trabajos-header h3 {
            font-size: 0.95rem;
            color: #000;
            font-weight: bold;
        }

        .trabajos-header span {
            font-size: 0.65rem;
            color: #666;
            font-weight: bold;
        }

        .lista-trabajos {
            max-height: 320px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .item-trabajo {
            padding: 10px 2px;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
        }

        .item-trabajo:last-child {
            border-bottom: none;
        }

        .cliente-nombre {
            font-weight: bold;
            font-size: 0.85rem;
            color: #000;
        }

        .fecha-trabajo {
            font-size: 0.7rem;
            color: #666;
            font-weight: bold;
        }

        .trabajo-desc {
            font-size: 0.75rem;
            color: #444;
            margin: 4px 0;
            line-height: 1.2;
        }

        .precio {
            font-weight: bold;
            color: #2ecc71;
            font-size: 0.9rem;
        }

        .ganancia-diaria {
            font-size: 0.65rem;
            color: #FF8533;
            font-weight: bold;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* --- 7. BOTONES DE ACCIÓN --- */
        .btn-volver {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background-color: #7f8c8d;
            border: 4px solid #000;
            border-radius: 20px;
            cursor: pointer;
            text-align: center;
        }

        .btn-volver:active {
            transform: scale(0.98);
        }

        .loading, .empty {
            text-align: center;
            padding: 30px;
            font-weight: bold;
            color: #777;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="contenedor-principal">
        <div class="bloque-encabezado">
            <img src="logo.png" alt="MaxSpeed" class="logo-imagen">
            <h1 class="titulo-seccion">📊 Panel de Caja</h1>
        </div>

        <div class="modulos">
            <button class="modulo-btn activo" data-modulo="taller">🔧 Taller</button>
            <button class="modulo-btn" data-modulo="vehiculos">🚗 Compra/Venta</button>
            <button class="modulo-btn" data-modulo="todo">🎯 Todo</button>
        </div>

        <div class="periodo-selector">
            <div class="tipo-vista">
                <button class="tipo-btn activo" data-tipo="mes">📅 Por Mes</button>
                <button class="tipo-btn" data-tipo="semana">📆 Por Semana</button>
                <button class="tipo-btn" data-tipo="dia">📅 Por Día</button>
                <button class="tipo-btn" data-tipo="anio">🗓️ Por Año</button>
            </div>

            <div id="selectores-mes" class="selector-filas">
                <div class="selector-grupo">
                    <label>📅 Año</label>
                    <select id="selectorAnio" class="selector-desplegable"></select>
                </div>
                <div class="selector-grupo">
                    <label>📆 Mes</label>
                    <select id="selectorMes" class="selector-desplegable">
                        <option value="0">Enero</option>
                        <option value="1">Febrero</option>
                        <option value="2">Marzo</option>
                        <option value="3">Abril</option>
                        <option value="4">Mayo</option>
                        <option value="5">Junio</option>
                        <option value="6">Julio</option>
                        <option value="7">Agosto</option>
                        <option value="8">Septiembre</option>
                        <option value="9">Octubre</option>
                        <option value="10">Noviembre</option>
                        <option value="11">Diciembre</option>
                    </select>
                </div>
            </div>

            <div id="selectores-semana" class="selector-filas" style="display: none;">
                <div class="selector-grupo">
                    <label>📆 Seleccionar semana</label>
                    <select id="selectorSemana" class="selector-desplegable">
                        <option value="0">Esta semana</option>
                        <option value="1">Semana pasada</option>
                        <option value="2">Hace 2 semanas</option>
                        <option value="3">Hace 3 semanas</option>
                        <option value="4">Hace 4 semanas</option>
                    </select>
                </div>
            </div>

            <div id="selectores-dia" class="selector-filas" style="display: none;">
                <div class="selector-grupo">
                    <label>📅 Seleccionar día</label>
                    <input type="date" id="selectorFechaDia" class="selector-desplegable">
                </div>
            </div>

            <div id="selectores-anio" class="selector-filas" style="display: none;">
                <div class="selector-grupo">
                    <label>🗓️ Seleccionar año</label>
                    <select id="selectorAnioVista" class="selector-desplegable"></select>
                </div>
            </div>
        </div>

        <div class="card-total">
            <div class="label" id="totalLabel">💰 GANANCIA REAL (ingresos - costo repuestos)</div>
            <div class="amount" id="totalAcumulado">$0</div>
            <div class="sub" id="periodoDescripcion">(Este mes)</div>
        </div>

        <div class="grid-cards">
            <div class="info-card">
                <div class="icon">📋</div>
                <div class="value" id="totalTrabajos">0</div>
                <div class="label">Transacciones</div>
            </div>
            <div class="info-card">
                <div class="icon">💰</div>
                <div class="value" id="totalIngresos">$0</div>
                <div class="label">Ingresos totales</div>
            </div>
            <div class="info-card">
                <div class="icon">📊</div>
                <div class="value" id="promedioTrabajo">$0</div>
                <div class="label">Promedio</div>
            </div>
            <div class="info-card">
                <div class="icon">⏱️</div>
                <div class="value" id="trabajoMasLargo">0</div>
                <div class="label">Día(s) más largo</div>
            </div>
        </div>

        <div class="card-earning">
            <div>
                <div class="label">💵 GANANCIA POR DÍA</div>
                <div class="value" id="gananciaPorDia">$0</div>
            </div>
            <div style="text-align: right;">
                <div class="label">📅 Total días</div>
                <div class="value" id="totalDiasTrabajo" style="font-size:1.3rem;">0</div>
            </div>
        </div>

        <div class="trabajos-container">
            <div class="trabajos-header">
                <h3 id="listaTitulo">📋 Últimos trabajos</h3>
                <span>toca para ver detalle</span>
            </div>
            <div class="lista-trabajos" id="listaTrabajos">
                <div class="loading">Cargando...</div>
            </div>
        </div>

        <button class="btn-volver" onclick="window.location.href='menu.html'">← Volver al Menú</button>
    </div>

    <script>
        let todosLosTrabajos = [];
        let todosLosVehiculos = []; 
        let datosOriginales = [];
        let moduloActual = "taller";
        let periodoActual = "mes";
        let inventarioProductos = [];

        function calcularDias(fechaIngreso, fechaSalida) {
            if (!fechaIngreso || !fechaSalida) return 1;
            const ingreso = new Date(fechaIngreso);
            const salida = new Date(fechaSalida);
            const diffTime = Math.abs(salida - ingreso);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays === 0 ? 1 : diffDays;
        }

        document.addEventListener("DOMContentLoaded", async () => {
            const tipoUsuario = localStorage.getItem('tipoUsuario');
            const pinGuardado = localStorage.getItem('pinValidated');
            
            if (tipoUsuario !== 'admin') {
                alert("⛔ Acceso denegado");
                window.location.href = "menu.html";
                return;
            }
            if (!pinGuardado) {
                window.location.href = "index.html";
                return;
            }
            
            // ============================================================
            // NUEVO: CARGAR INVENTARIO PRIMERO
            // ============================================================
            try {
                const res = await fetch('/obtener-inventario');
                inventarioProductos = await res.json();
                console.log("✅ Inventario cargado:", inventarioProductos.length, "productos");
            } catch (error) {
                console.error("Error cargando inventario:", error);
            }
            
            generarAnios();
            await cargarDatos();
                    
            const fechaActual = new Date();
            const anioActual = fechaActual.getFullYear();
            const mesActual = fechaActual.getMonth();

            document.getElementById('selectorAnio').value = anioActual;
            document.getElementById('selectorMes').value = mesActual;

            let tipoVistaActual = "mes"; 

            function cambiarTipoVista(tipo) {
                tipoVistaActual = tipo;
                window.tipoVistaActual = tipo;
                
                document.getElementById('selectores-mes').style.display = tipo === "mes" ? "flex" : "none";
                document.getElementById('selectores-semana').style.display = tipo === "semana" ? "flex" : "none";
                document.getElementById('selectores-dia').style.display = tipo === "dia" ? "flex" : "none";
                document.getElementById('selectores-anio').style.display = tipo === "anio" ? "flex" : "none";  // ← NUEVO
                
                document.querySelectorAll('.tipo-btn').forEach(btn => {
                    if (btn.dataset.tipo === tipo) {
                        btn.classList.add('activo');
                    } else {
                        btn.classList.remove('activo');
                    }
                });
                
                actualizarVista();
            }

            document.querySelectorAll('.tipo-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    cambiarTipoVista(btn.dataset.tipo);
                });
            });

            document.getElementById('selectorAnio').addEventListener('change', () => actualizarVista());
            document.getElementById('selectorMes').addEventListener('change', () => actualizarVista());
            document.getElementById('selectorSemana').addEventListener('change', () => actualizarVista());
            document.getElementById('selectorFechaDia').addEventListener('change', () => actualizarVista());
            document.getElementById('selectorAnioVista').addEventListener('change', () => actualizarVista());

            document.querySelectorAll('.modulo-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.modulo-btn').forEach(b => b.classList.remove('activo'));
                    btn.classList.add('activo');
                    moduloActual = btn.dataset.modulo;
                    actualizarVista();
                });
            });
            
            window.tipoVistaActual = tipoVistaActual;
            actualizarVista();
            function generarAnios() {
                const selectorAnio = document.getElementById('selectorAnio');
                const selectorAnioVista = document.getElementById('selectorAnioVista');
                const añoActual = new Date().getFullYear();
                const añoInicio = 2016;
                const añoFin = añoActual + 5;
                
                [selectorAnio, selectorAnioVista].forEach(selector => {
                    if (!selector) return;
                    selector.innerHTML = '';
                    for (let año = añoInicio; año <= añoFin; año++) {
                        const option = document.createElement('option');
                        option.value = año;
                        option.textContent = año;
                        if (año === añoActual) {
                            option.selected = true;
                        }
                        selector.appendChild(option);
                    }
                });
            }
        });
        
        async function cargarDatos() {
            try {
                const pinGuardado = localStorage.getItem('pinValidated');
                const res = await fetch(`/obtener-clientes?pin=${pinGuardado}`);
                datosOriginales = await res.json();
                if (datosOriginales.error) return;
                
                todosLosTrabajos = [];
                datosOriginales.forEach(registro => {
                    const fechaGanancia = registro.fechaSalida || registro.fechaIngreso;
                    const diasDuracion = calcularDias(registro.fechaIngreso, registro.fechaSalida);
                    let trabajoAgregado = false;
                    
                    // ============================================================
                    // NUEVO: Calcular costo de repuestos para este registro
                    // ============================================================
                    let costoRepuestos = 0;
                    if (registro.repuestos && registro.repuestos.length > 0) {
                        registro.repuestos.forEach(rep => {
                            if (rep.descripcion) {
                                // Buscar el producto en inventario por nombre
                                const producto = inventarioProductos.find(p => p.nombre === rep.descripcion);
                                if (producto) {
                                    costoRepuestos += parseFloat(producto.costo) || 0;
                                }
                            }
                        });
                    }
                    
                    if (registro.trabajos && registro.trabajos.length > 0) {
                        registro.trabajos.forEach(trabajo => {
                            if (trabajo.precio && parseFloat(trabajo.precio) > 0) {
                                todosLosTrabajos.push({
                                    id: registro._id,
                                    cliente: registro.cliente,
                                    fecha: fechaGanancia,
                                    diasDuracion: diasDuracion,
                                    gananciaPorDia: parseFloat(trabajo.precio) / diasDuracion,
                                    descripcion: trabajo.descripcion,
                                    precio: parseFloat(trabajo.precio) || 0,
                                    costoRepuestos: costoRepuestos, // ← NUEVO
                                    gananciaReal: parseFloat(trabajo.precio) - costoRepuestos, // ← NUEVO
                                    vehiculo: registro.vehiculo?.modelo || "N/A",
                                    tipo: "taller"
                                });
                                trabajoAgregado = true;
                            }
                        });
                    }
                    
                    if (!trabajoAgregado && registro.total && parseFloat(registro.total) > 0) {
                        todosLosTrabajos.push({
                            id: registro._id,
                            cliente: registro.cliente,
                            fecha: fechaGanancia,
                            diasDuracion: diasDuracion,
                            gananciaPorDia: parseFloat(registro.total) / diasDuracion,
                            descripcion: registro.observacionesAdicionales || "Servicio completo",
                            precio: parseFloat(registro.total) || 0,
                            costoRepuestos: costoRepuestos, // ← NUEVO
                            gananciaReal: parseFloat(registro.total) - costoRepuestos, // ← NUEVO
                            vehiculo: registro.vehiculo?.modelo || "N/A",
                            tipo: "taller"
                        });
                    }
                });
                
                console.log(`✅ ${todosLosTrabajos.length} trabajos de taller`);
            } catch (error) {
                console.error("Error:", error);
            }
        }
        
        function obtenerRangoFecha() {
            let inicio, fin;
            let descripcion = "";
            
            const anio = parseInt(document.getElementById('selectorAnio').value) || new Date().getFullYear();
            const mes = parseInt(document.getElementById('selectorMes').value) || 0;
            const semanaOffset = parseInt(document.getElementById('selectorSemana').value) || 0;
            const fechaDia = document.getElementById('selectorFechaDia').value;
            const anioVista = parseInt(document.getElementById('selectorAnioVista').value) || new Date().getFullYear(); // ← NUEVO
            const tVista = window.tipoVistaActual || "mes";
            
            // ============================================================
            // NUEVO: Vista POR AÑO
            // ============================================================
            if (tVista === "anio") {
                inicio = new Date(anioVista, 0, 1);
                fin = new Date(anioVista, 11, 31, 23, 59, 59);
                descripcion = `Año ${anioVista}`;
                return { inicio, fin, descripcion };
            }
            
            // Vista por DÍA - CORREGIDO (usar división manual para evitar problemas de zona horaria)
            if (tVista === "dia" && fechaDia) {
                const [year, month, day] = fechaDia.split('-').map(Number);
                inicio = new Date(year, month - 1, day, 0, 0, 0, 0);
                fin = new Date(year, month - 1, day, 23, 59, 59, 999);
                descripcion = `${inicio.toLocaleDateString('es-ES')}`;
                return { inicio, fin, descripcion };
            }
    
            if (tVista === "semana") {
                const hoy = new Date();
                const diaSemana = hoy.getDay();
                const diasOffset = (semanaOffset * 7) + diaSemana;
                const inicioSemana = new Date(hoy);
                inicioSemana.setDate(hoy.getDate() - diasOffset);
                inicioSemana.setHours(0,0,0,0);
                
                const finSemana = new Date(inicioSemana);
                finSemana.setDate(inicioSemana.getDate() + 6);
                finSemana.setHours(23,59,59,999);
                
                inicio = inicioSemana;
                fin = finSemana;
                
                const nombreSemana = semanaOffset === 0 ? "Esta semana" : 
                                    semanaOffset === 1 ? "Semana pasada" :
                                    `Hace ${semanaOffset} semanas`;
                descripcion = `${nombreSemana} (${inicio.toLocaleDateString('es-ES')} - ${finSemana.toLocaleDateString('es-ES')})`;
                return { inicio, fin, descripcion };
            }
            
            inicio = new Date(anio, mes, 1);
            fin = new Date(anio, mes + 1, 0, 23, 59, 59);
            const nombreMes = document.querySelector('#selectorMes option:checked')?.text || "Mes";
            descripcion = `${nombreMes} ${anio}`;
            
            return { inicio, fin, descripcion };
        }
        
        function filtrarPorModuloYFecha() {
            const { inicio, fin, descripcion } = obtenerRangoFecha();
            const descElem = document.getElementById('periodoDescripcion');
            if(descElem) descElem.textContent = descripcion;
            
            let items = [];
            if (moduloActual === "taller" || moduloActual === "todo") {
                items = items.concat(todosLosTrabajos);
            }
            
            return items.filter(item => {
                const fecha = new Date(item.fecha);
                return fecha >= inicio && fecha <= fin;
            });
        }
        
        function actualizarVista() {
            const items = filtrarPorModuloYFecha();
            
            // ============================================================
            // CALCULAR INGRESOS, COSTO Y GANANCIA REAL
            // ============================================================
            const totalIngresos = items.reduce((sum, t) => sum + t.precio, 0);
            const totalCosto = items.reduce((sum, t) => sum + (t.costoRepuestos || 0), 0);
            const totalGananciaReal = items.reduce((sum, t) => sum + (t.gananciaReal || 0), 0);
            const promedio = items.length > 0 ? totalIngresos / items.length : 0;
            const maxDias = items.length > 0 ? Math.max(...items.map(t => t.diasDuracion || 1)) : 0;
            const totalDias = items.reduce((sum, t) => sum + (t.diasDuracion || 1), 0);
            
            // ============================================================
            // Total de días del período seleccionado
            // ============================================================
            const { inicio, fin } = obtenerRangoFecha();
            const totalDiasPeriodo = Math.ceil((fin - inicio) / (1000 * 60 * 60 * 24));
            
            // ============================================================
            // GANANCIA POR DÍA = Ganancia total del mes / días del mes
            // ============================================================
            const gananciaPorDiaTotal = totalGananciaReal / totalDiasPeriodo;

            document.getElementById('listaTitulo').textContent = "📋 Últimos trabajos";
            document.getElementById('totalLabel').textContent = "💰 GANANCIA REAL (ingresos - costo repuestos)";
            
            // Mostrar GANANCIA REAL en la tarjeta principal
            document.getElementById('totalAcumulado').textContent = `$${totalGananciaReal.toFixed(2)}`;
            document.getElementById('totalTrabajos').textContent = items.length;
            document.getElementById('totalIngresos').textContent = `$${totalIngresos.toFixed(2)}`;
            document.getElementById('promedioTrabajo').textContent = `$${promedio.toFixed(2)}`;
            
            document.getElementById('gananciaPorDia').textContent = `$${gananciaPorDiaTotal.toFixed(2)}`;
            document.getElementById('trabajoMasLargo').textContent = maxDias;
            document.getElementById('totalDiasTrabajo').textContent = totalDiasPeriodo;
            
            const contenedor = document.getElementById('listaTrabajos');
            if (items.length === 0) {
                contenedor.innerHTML = '<div class="empty">📭 No hay registros en este período</div>';
                return;
            }
            
            items.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
            contenedor.innerHTML = items.slice(0, 20).map(t => `
                <div class="item-trabajo" onclick="verDetalle('${t.id}')">
                    <div class="flex-between">
                        <span class="cliente-nombre">👤 ${escapeHtml(t.cliente)}</span>
                        <span class="fecha-trabajo">${formatearFecha(t.fecha)}</span>
                    </div>
                    <div class="trabajo-desc">🔧 ${escapeHtml(t.descripcion)} (${escapeHtml(t.vehiculo)})</div>
                    <div class="flex-between">
                        <span class="ganancia-diaria">⏱️ ${t.diasDuracion} día(s) - $${(t.diasDuracion > 0 ? (t.gananciaReal || 0) / t.diasDuracion : 0).toFixed(2)}/día</span>
                        <span class="precio">💰 $${t.precio.toFixed(2)}</span>
                    </div>
                    <div style="font-size:0.65rem; color:#888; margin-top:4px;">
                        Costo repuestos: $${(t.costoRepuestos || 0).toFixed(2)} | Ganancia real: $${(t.gananciaReal || 0).toFixed(2)}
                    </div>
                </div>
            `).join('');
        }
        
        function formatearFecha(fechaISO) {
            if (!fechaISO) return "S/F";
            const fecha = new Date(fechaISO);
            return fecha.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' });
        }
        
        function escapeHtml(texto) {
            if (!texto) return "";
            return texto.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
        
        function verDetalle(id) {
            const registro = datosOriginales.find(r => r._id === id);
            if (registro) {
                localStorage.setItem('trabajoSeleccionado', JSON.stringify(registro));
                window.location.href = "ver-trabajo.html";
            } else {
                alert("No se encontró el trabajo");
            }
        }
    </script>
</body>
</html>
